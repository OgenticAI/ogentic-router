# Demo routing policy — exercises all four adapter kinds.
#
# Read top-to-bottom, first match wins:
#   1. Legal privilege            -> llama.cpp   (on-device)
#   2. Health PHI / finance MNPI  -> Ollama      (on-device)
#   3. Otherwise very sensitive   -> Ollama      (on-device)
#   4. Moderately sensitive (>=25)-> Anthropic, redacted first
#   5. Everything else            -> OpenAI, in the clear
#
# The point: the decision is made on-device, before any content leaves. Which
# local engine (llama.cpp vs Ollama) is illustrative — both stay on the machine.
version: 1
default_backend: ollama-local

rules:
  - id: privilege-to-llamacpp
    when:
      groups_include: [PRIVILEGE]
    route: llamacpp-local

  - id: phi-mnpi-to-ollama
    when:
      groups_include: [PHI, MNPI]
    route: ollama-local

  - id: high-sensitivity-stays-local
    when:
      sensitivity_score_gte: 70
    route: ollama-local

  - id: medium-redact-then-cloud
    when:
      sensitivity_score_gte: 25
    route: anthropic-cloud
    transform: shield_redact

  - id: low-cloud
    when:
      sensitivity_score_gte: 0
    route: openai-cloud
