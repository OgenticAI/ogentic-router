# Self-hosted UAT override flow — fires on PR comments containing /uat-override.
#
# Uses the remote @v2 action path (post-OGE-366 fix) so consumers don't need
# the local .github/actions/override/ directory.

name: OgenticAI Reviewer — UAT Override

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: write

jobs:
  override:
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/uat-override')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: OgenticAI/agent-reviewer/.github/actions/override@v2
        with:
          github_app_id: ${{ secrets.OGENTICAI_REVIEWER_APP_ID }}
          github_app_private_key: ${{ secrets.OGENTICAI_REVIEWER_APP_KEY }}
          linear_api_token: ${{ secrets.LINEAR_API_TOKEN }}
