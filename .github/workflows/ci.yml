# CI for ogentic-router.
#
# Mirrors the ogentic-shield CI shape so contributors moving between repos
# see the same surface. Three jobs:
#   - lint   — ruff
#   - types  — mypy on src/
#   - test   — pytest on the matrix of supported Pythons
#
# All jobs run in parallel; matrix the test job over 3.10 / 3.11 / 3.12
# to lock the supported-Python claim in pyproject.toml.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv venv
      - run: uv pip install --python .venv/bin/python -e ".[dev]"
      - run: .venv/bin/ruff check src/ tests/

  types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv venv
      - run: uv pip install --python .venv/bin/python -e ".[dev]"
      - run: .venv/bin/mypy src/

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv venv --python ${{ matrix.python }}
      - run: uv pip install --python .venv/bin/python -e ".[dev]"
      - run: .venv/bin/pytest tests/ -v
