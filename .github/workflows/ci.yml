# CI for ogentic-router.
#
# Mirrors the ogentic-shield CI shape so contributors moving between repos
# see the same surface. Three jobs:
#   - lint   — ruff
#   - types  — mypy on src/
#   - test   — pytest on the matrix of supported Pythons
#
# All jobs run in parallel; matrix the test job over 3.10 / 3.11 / 3.12
# to lock the supported-Python claim in pyproject.toml.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v3
      - run: uv venv
      - run: uv pip install --python .venv/bin/python -e ".[dev]"
      - run: .venv/bin/ruff check src/ tests/

  types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v3
      - run: uv venv
      # mypy reads policy/models.py which does ``from ogentic_shield import CategoryGroup``
      # inside a function. ``ignore_missing_imports = true`` in pyproject.toml keeps
      # mypy lenient on unresolved deps, so no Shield install needed here.
      # [server] pulls fastapi so mypy can resolve the decorator types in server/app.py.
      - run: uv pip install --python .venv/bin/python -e ".[server,dev]"
      - run: .venv/bin/mypy src/

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v3
      - run: uv venv --python ${{ matrix.python }}
      # [shield] resolves ogentic-shield from PyPI (v0.3.0+ as of OGE-588).
      # The policy DSL's category-name validator imports CategoryGroup at
      # runtime, so Shield must be available in the test job.
      # [cloud]  pulls openai/anthropic for the adapter tests in tests/adapters/.
      # The adapters lazy-import these SDKs at construction time, but the
      # mocked-SDK tests instantiate the adapters and need the import to succeed.
      # [server] pulls fastapi/uvicorn for the OGE-583 server tests in tests/server/.
      - run: uv pip install --python .venv/bin/python -e ".[shield,cloud,server,dev]"
      - run: .venv/bin/pytest tests/ -v
